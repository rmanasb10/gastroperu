<!DOCTYPE html>
<html lang="es">
   <head>
      <meta charset="utf-8">
      <title>Gastro Perú Galería</title>
      <meta name="description" content="Espacio de Gastro Perú dedicado a una galería de las mejoras recetas seleccionadas por el equipo de Gastro Perú">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="../css/main.scss">
      <link rel="icon" href="../img/favicon.ico">
      <script type="module" src="../script/script.js"></script>
   </head>
   <body class="container">
      <include src="componentes/header.html"></include>
      <main>
         <h1>Galería</h1>
         <p>Descubre las mejores recetas de la gastronomía peruana a través de esta galería de imágenes</p>
         <div class="galeria">
            <p>Optimización de imágenes - Diferente tamaño</p>
            <div>
               <figure>
                  <figcaption>Imagen original PNG</figcaption>
                  <img src="../img/ceviche.png" alt="Imagen de un plato de ceviche en formato png">
               </figure>
               <figure>
                  <figcaption>Imagen webp para móvil (460px)</figcaption>
                  <img src="../img/ceviche.png?as=webp&width=460&quality=60" alt="Imagen de un plato de ceviche optimizada para móvil">
               </figure>
               <figure>
                  <figcaption>Imagen webp para tablet (1024px)</figcaption>
                  <img src="../img/ceviche.png?as=webp&width=1024&quality=70" alt="Imagen de un plato de ceviche optimizada para tablet">
               </figure>
               <figure>
                  <figcaption>Imagen webp para escritorio (1920px)</figcaption>
                  <img src="../img/ceviche.png?as=webp&width=1920&quality=80" alt="Imagen de un plato de ceviche optimizada para escritorio">
               </figure>
            </div>
         </div>
         <div class="galeria">
            <p>Optimización de imágenes - Diferente resolución</p>
            <div>
               <figure>
                  <figcaption>Resolución a 1x</figcaption>
                  <picture>
                     <source type="image/webp"
                     srcset="../img/lomo_saltado.png?as=webp&width=460&quality=60 1x">
                     <img src="../img/lomo_saltado.png" alt="Imagen de lomo saltado optimizada a 1x">
                  </picture>
               </figure>
               <figure>
                  <figcaption>Resolución a 1.5x</figcaption>
                  <picture>
                     <source type="image/webp"
                     srcset="../img/lomo_saltado.png?as=webp&width=460&quality=70 1.5x">
                     <img src="../img/lomo_saltado.png" alt="Imagen de lomo saltado optimizada a 1.5x">
                  </picture>
               </figure>
               <figure>
                  <figcaption>Resolución a 2x</figcaption>
                  <picture>
                     <source type="image/webp"
                     srcset="../img/lomo_saltado.png?as=webp&width=460&quality=80 2x">
                     <img src="../img/lomo_saltado.png" alt="Imagen de lomo saltado optimizada a 2x">
                  </picture>
               </figure>
            </div>
         </div>
      </main>
      <include src="componentes/footer.html"></include>
   </body>
</html>
