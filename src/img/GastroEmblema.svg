<svg width="100%" viewBox="0 0 400 400" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Logo GP con animación de color</title>
  <desc>Círculo blanco con reborde rojo y letras GP animadas de rojo tenue a rojo bermellón</desc>

  <style>
    @keyframes degradacion {
      0%   { fill: rgba(184, 21, 21, 0.15); }
      50%  { fill: rgba(184, 21, 21, 1); }
      100% { fill: rgba(184, 21, 21, 0.15); }
    }
  </style>

  <circle cx="200" cy="200" r="190" fill="#FFFFFF" stroke="#B81515" stroke-width="8"/>

  <text
    x="200" y="200"
    fill="#B81515"
    font-family="Georgia, serif"
    font-size="140px"
    font-weight="bold"
    text-anchor="middle"
    dominant-baseline="central"
    letter-spacing="4px"
    style="animation: degradacion 6s ease-in-out infinite;">GP</text>

</svg>